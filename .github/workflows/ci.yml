name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - feat/migrate-less-to-tailwind

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: CUJ regression tests
        run: npm run test:cuj

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: CUJ E2E smoke test (Chromium/Firefox/WebKit)
        run: npm run test:e2e

      - name: Full test suite
        run: npm run test:ci

      - name: Build
        run: npm run build

      - name: Performance benchmark smoke test
        run: |
          npm run start -- --port 3000 > /tmp/json-viewer.log 2>&1 &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT

          for _ in {1..60}; do
            if curl -fsS http://127.0.0.1:3000 > /dev/null; then
              npm run benchmark:ci
              exit 0
            fi
            sleep 1
          done

          cat /tmp/json-viewer.log
          exit 1
