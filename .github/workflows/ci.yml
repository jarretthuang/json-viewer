name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - feat/migrate-less-to-tailwind

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: CUJ regression tests
        run: npm run test:cuj

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: CUJ E2E smoke test (Chromium/Firefox/WebKit)
        run: npm run test:e2e

      - name: Full test suite
        run: npm run test:ci

      - name: Build
        run: npm run build
